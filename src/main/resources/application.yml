spring:
  application:
    name: ai-customer-service
  datasource:
    url: jdbc:h2:mem:acsdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

server:
  port: 8080

acs:
  llm:
    api-key: ${OPENAI_API_KEY:demo-key}
    model: gpt-4o-mini
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    demo-mode: true
  handoff:
    high-risk-emotion-threshold: 0.7
    max-consecutive-failures: 2
    knowledge-retrieval-min-score: 0.6
  knowledge-mining-cron: "0 0 2 * * *"
